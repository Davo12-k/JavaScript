<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body class=" h-[100vh] w-[100%] flex flex-col justify-center items-center gap-4" >
    <h1 class="text-4xl text-green-500">COUNTER APP</h1>
       <p id="counter"></p>
       <button id="addBtn" class="h-[5vh] w-[3%] bg-green-500">+</button>
       <button id="decreaseBtn" class="h-[5vh] w-[3%] bg-red-700">-</button>
       <button id="resetBtn" class="h-[5vh] w-[3%] bg-black text-white">Reset</button>


    <script>
    const counter = document.getElementById(`counter`)
    const addBtn = document.getElementById(`addBtn`)
    const decreaseBtn = document.getElementById(`decreaseBtn`)
    const resetBtn = document.getElementById(`resetBtn`)
    document.body.style.backgroundColor = `skyblue`

    function displayCount(){
        counter.innerText = count;

        if (count >0){
            counter.style.color = `green`
        } else if (count < 0){
            counter.style.color = `red`
        } else {
          counter.style.color = `black`
        }

    }

    let count = 0
    counter.innerText = count;
    counter.style.fontSize = `4rem`

    addBtn.addEventListener(`click`, ()=>{
     count += 1
        displayCount()
    })

    decreaseBtn.addEventListener(`click`, ()=>{
        count -=1
        displayCount()
    }) 
    resetBtn.addEventListener(`click`, ()=>{
        count = 0
        displayCount()
    })
    </script>
</body>
</html>
